# OpenVMM Windows 11 VM (managed by ovm, not qm)
# ================================================
#
# This VM is started with openvmm instead of QEMU.
# Use%3A ovm start 39999 / ovm stop 39999
# Do NOT use%3A qm start 39999 (blocked by hookscript)
#
# Auto-translated fields (from Proxmox config to openvmm flags)%3A
#   memory  -> --memory <N>MB
#   cores   -> --processors <cores * sockets>
#   sockets -> (multiplied with cores)
#   net0    -> --net tap%3Atap<vmid>i0 (bridge extracted from net0)
#
# These can be OVERRIDDEN by specifying the same flag in args%3A.
# If --memory, --processors, or --net appears in args%3A, the
# auto-translated value is skipped for that flag.
#
# Ignored Proxmox fields (not relevant for openvmm)%3A
#   machine  %E2%80%94 QEMU concept (q35/i440fx). openvmm has its own fixed
#              Hyper-V Gen2 hardware model, no --machine flag exists.
#   cpu      %E2%80%94 QEMU CPU type. openvmm passes through host CPU via KVM.
#   bios     %E2%80%94 always MSVM UEFI (specified via --uefi-firmware in args)
#   scsihw   %E2%80%94 QEMU SCSI controller. openvmm uses VMBus SCSI (storvsc).
#   vga      %E2%80%94 QEMU display type. openvmm uses --gfx (Hyper-V synthetic).
#   balloon  %E2%80%94 QEMU balloon. Not supported in openvmm.
#   agent    %E2%80%94 QEMU guest agent. Not supported in openvmm.
#
# Everything else goes in args%3A (disks, firmware, performance, etc.)
#
# === args%3A openvmm flags reference ===
#
# HYPERVISOR%3A
#   --hypervisor <kvm|...>                 Hypervisor backend [default%3A kvm]
#
# FIRMWARE%3A
#   --uefi                                 Boot UEFI firmware (required)
#   --uefi-firmware <FILE>                 UEFI firmware file (MSVM.fd)
#   --hv                                   Enable Hyper-V enlightenments
#
# MEMORY%3A
#   --memory <SIZE>                        Guest RAM (e.g. 4GB, 20480MB)
#   --private-memory                       Private anonymous memory (better for KVM)
#   --thp                                  Transparent huge pages (requires --private-memory)
#   --prefetch                             Pre-fault guest RAM at startup
#   --shared-memory                        Use shared memory segment
#   --memory-backing-file <FILE>           File-backed RAM (enables snapshots)
#
# CPU%3A
#   --processors <N>                       Number of vCPUs
#   --smt <auto|force|off>                 Hyperthreading [default%3A auto]
#   --x2apic <auto|supported|off|on>       x2APIC mode [default%3A auto]
#   --vps-per-socket <N>                   Max VPs per socket
#   --apic-id-offset <N>                   APIC ID offset [default%3A 0]
#
# DISKS%3A
#   --disk /path/to/image.raw              VMBus SCSI disk (boot disk)
#   --disk /path/to/file.iso,ro,dvd        CD/DVD read-only
#   --nvme /path/to/image.raw              NVMe disk
#   --virtio-blk /path/to/image.raw        virtio-blk disk
#   --ide /path/to/image.raw               IDE disk
#   --floppy /path/to/floppy.img           Floppy (no UEFI)
#   --scsi-sub-channels <N>                Parallel SCSI I/O channels [default%3A 0]
#
# NETWORKING%3A
#   --net <consomme|tap%3ANAME|none>         Network backend
#     consomme = built-in NAT (no inbound)
#     tap%3ANAME = bridged via tap device
#   NOTE%3A MAC address from net0 is NOT translated. openvmm always assigns
#   a Hyper-V MAC (00%3A15%3A5d%3Axx%3Axx%3Axx). Use static IP in guest or create
#   a DHCP reservation for the Hyper-V MAC to get a stable IP.
#
# SERIAL CONSOLE%3A
#   --com1 <console|none|stderr|file=PATH|listen=tcp%3AIP%3APORT>
#   --com2 <same options>
#   --uefi-console-mode <default|com1|com2|none>
#
# GRAPHICS%3A
#   --gfx                                  Enable graphics device
#   --vnc                                  Enable VNC server (implied by --gfx)
#   --vnc-port <PORT>                      VNC port [default%3A 5900]
#
# SECURITY%3A
#   --secure-boot                          Enable secure boot
#   --secure-boot-template <windows|uefi-ca>  Secure boot template
#   --tpm                                  Add vTPM device
#
# VIRTIO DEVICES%3A
#   --virtio-9p <tag,root_path>            9p filesystem share
#   --virtio-fs <tag,root_path,[opts]>     virtiofs share
#   --virtio-rng                           Entropy device
#   --virtio-console <BACKEND>             Console (/dev/hvc0)
#
# BOOT%3A
#   --default-boot-always-attempt          Try default boot even if entries fail
#   --pcat-boot-order <floppy,hdd,optical,net>  BIOS boot order (PCAT only)
#
# DEBUGGING%3A
#   --gdb <PORT>                           GDB debugger
#   --uefi-debug                           UEFI debug on COM1
#   --log-file <PATH>                      Log to file
#   --halt-on-reset                        Halt instead of reset
#   --single-process                       No child processes
#
# ================================================
args: --hypervisor kvm --hv --uefi --uefi-firmware /etc/openvmm/MSVM.fd --gfx --vnc --vnc-port 5999 --com1 console --default-boot-always-attempt --private-memory --thp --prefetch --disk /zpool-nvme/images-openvmm/39999/vm-39999-disk-0.raw --scsi-sub-channels 4
cores: 16
hookscript: local:snippets/openvmm-guard.sh
memory: 20480
name: vm-ghrun-openvmm
net0: virtio=BC:24:11:68:35:8C,bridge=vmbr0
ostype: win11
sockets: 1
